name: ShyamDuels
version: ${project.version}
main: dev.piyush.shyamduels.ShyamDuels
api-version: '1.20'
authors: [Piyush]
description: High-performance dueling plugin with ELO, parties, FFA, and advanced kit system
website: https://github.com/ShyamStudios/ShyamDuels
depend: [FastAsyncWorldEdit]
softdepend: [PlaceholderAPI]
libraries:
  - com.github.ben-manes.caffeine:caffeine:3.1.8
  - org.xerial:sqlite-jdbc:3.45.3.0
  - com.mysql:mysql-connector-j:8.3.0
  - com.mchange:c3p0:0.9.5.5

permissions:
  shyamduels.admin:
    description: Full admin access to all commands
    default: op
  shyamduels.admin.bypass:
    description: Bypass build restrictions in arenas
    default: op
  shyamduels.vip:
    description: VIP features including armor trims and larger parties
    default: op
  shyamduels.use:
    description: Basic plugin usage
    default: true
  shyamduels.effect.*:
    description: Access to all kill effects
    default: op
  shyamduels.effect.none:
    description: No effect
    default: true
  shyamduels.effect.blood:
    description: Blood Explosion effect
    default: false
  shyamduels.effect.lightning:
    description: Lightning Strike effect
    default: false
  shyamduels.effect.explosion:
    description: TNT Blast effect
    default: false
  shyamduels.effect.flame:
    description: Inferno effect
    default: false
  shyamduels.effect.heart:
    description: Love Burst effect
    default: false
  shyamduels.effect.ender:
    description: Ender Vortex effect
    default: false
  shyamduels.effect.snow:
    description: Blizzard effect
    default: false
  shyamduels.effect.slime:
    description: Slime Explosion effect
    default: false
  shyamduels.effect.smoke:
    description: Smoke Bomb effect
    default: false
  shyamduels.effect.water:
    description: Tsunami effect
    default: false
  shyamduels.effect.lava:
    description: Volcano effect
    default: false
  shyamduels.effect.enchant:
    description: Mystic Runes effect
    default: false
  shyamduels.effect.crit:
    description: Critical Strike effect
    default: false
  shyamduels.effect.magic:
    description: Arcane Blast effect
    default: false
  shyamduels.effect.witch:
    description: Witch Curse effect
    default: false
  shyamduels.effect.dragon:
    description: Dragon Roar effect
    default: false
  shyamduels.effect.totem:
    description: Resurrection effect
    default: false
  shyamduels.effect.firework:
    description: Celebration effect
    default: false
  shyamduels.effect.note:
    description: Symphony effect
    default: false
  shyamduels.effect.villager:
    description: Trade Success effect
    default: false
  shyamduels.effect.angry:
    description: Rage Mode effect
    default: false
  shyamduels.effect.soul:
    description: Soul Reaper effect
    default: false
  shyamduels.effect.sculk:
    description: Warden's Wrath effect
    default: false
  shyamduels.effect.honey:
    description: Sweet Victory effect
    default: false
  shyamduels.effect.spore:
    description: Nature's Bloom effect
    default: false
  shyamduels.effect.cherry:
    description: Sakura Storm effect
    default: false
  shyamduels.effect.glow:
    description: Bioluminescence effect
    default: false
  shyamduels.effect.wax:
    description: Candle Ritual effect
    default: false
  shyamduels.effect.electric:
    description: Thunderbolt effect
    default: false
  shyamduels.effect.rainbow:
    description: Prismatic Burst effect
    default: false

commands:
  duel:
    description: Challenge players to duels
    usage: /duel <player>
    aliases: [1v1]
  
  ffa:
    description: Join Free For All mode
    usage: /ffa [arena]
    aliases: [freeforall]
  
  queue:
    description: Join ranked matchmaking
    usage: /queue [mode]
    aliases: [play, ranked]
  
  kiteditor:
    description: Customize your kit layouts
    usage: /kiteditor [kit]
    aliases: [editkit, kitedit]
  
  leavefight:
    description: Leave current match or return to lobby
    usage: /leavefight
    aliases: [leave, spawn, lobby]
  
  arena:
    description: Arena management commands
    usage: /arena <create|delete|list|...>
    permission: shyamduels.admin
    aliases: [arenas]
  
  kit:
    description: Kit management commands
    usage: /kit <create|delete|list|...>
    permission: shyamduels.admin
    aliases: [kits]
  
  shyamduels:
    description: Main plugin command
    usage: /shyamduels [reload]
    permission: shyamduels.admin
    aliases: [sd, duels]
  
  spectate:
    description: Spectate active matches
    usage: /spectate [player]
    aliases: [spec, watch]
  
  party:
    description: Party management
    usage: /party <create|invite|accept|...>
    aliases: [p, team]
  
  partychat:
    description: Toggle party chat mode
    usage: /partychat
    aliases: [pc, pchat]
  
  settings:
    description: Open player settings menu
    usage: /settings
    aliases: [preferences, prefs]
  
  effects:
    description: Open kill effects menu
    usage: /effects
    aliases: [killeffects, ke]
